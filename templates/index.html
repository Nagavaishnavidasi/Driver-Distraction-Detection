<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Distraction Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8fafc;
        }
        .main-card {
            max-width: 500px;
            margin: 50px auto;
            padding: 2em;
            border-radius: 18px;
            box-shadow: 0 0 18px rgba(0,0,0,0.07);
            background: #fff;
        }
        .title {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
            text-align: center;
        }
        .subtitle {
            color: #888;
            text-align: center;
            margin-bottom: 2em;
        }
        .buzzer {
            display: none;
        }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="title">🚗 Driver Distraction Detection</div>
        <div class="subtitle">Car/Roadway Transport MVP — Image Upload</div>
        <form method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <input class="form-control" type="file" name="file" accept="image/*" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-2">Predict</button>
        </form>
        <a href="/webcam" class="btn btn-success w-100" style="font-size:1.2em;">Go to Live Webcam</a>
    </div>
</body>
</html>
