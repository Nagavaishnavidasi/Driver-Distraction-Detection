<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Distraction Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { 
      background: #f8fafc; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
    }
    .main-card { 
      width: 600px; 
      padding: 2em; 
      border-radius: 18px; 
      box-shadow: 0 0 18px rgba(0,0,0,0.08); 
      background: #fff; 
      text-align: center;
    }
    .img-preview { 
      max-width: 100%; 
      border-radius: 12px; 
      border: 4px solid #e5e7eb; 
      margin-bottom: 1.5rem; 
    }
    .alert { 
      font-size: 1.3rem; 
      font-weight: bold; 
      border-radius: 12px; 
      padding: 1.2rem; 
    }
    .alert-high { background: #ff4d4d; color: #fff; }
    .alert-medium { background: #ffa500; color: #fff; }
    .alert-safe { background: #4CAF50; color: #fff; }
    .label { font-size: 1.2em; margin-top: .5rem; display: block; }
  </style>
</head>
<body>
  <div class="main-card">
    <img src="{{ url_for('static', filename='uploads/' + filename) }}" class="img-preview" alt="Uploaded Image">

    {% if severity == 'high' %}
    <div class="alert alert-high">
      ⚠ HIGH RISK!
      <span class="label">{{ label }}</span>
    </div>
    <audio autoplay>
      <source src="{{ url_for('static', filename='buzzer.mp3') }}" type="audio/mp3">
    </audio>

    {% elif severity == 'medium' %}
    <div class="alert alert-medium">
      ⚠ WARNING
      <span class="label">{{ label }}</span>
    </div>
    <audio autoplay>
      <source src="{{ url_for('static', filename='buzzer.mp3') }}" type="audio/mp3">
    </audio>

    {% else %}
    <div class="alert alert-safe">
      ✔ SAFE DRIVING
      <span class="label">{{ label }}</span>
    </div>
    {% endif %}

    <a href="/" class="btn btn-outline-primary w-100 mt-3">Try Another Image</a>
  </div>
</body>
</html>
