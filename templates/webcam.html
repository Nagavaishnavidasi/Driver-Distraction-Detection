<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Driver Distraction Detection - Webcam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { 
      background: #f8fafc; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
    }

    .main-card { 
      width: 700px; 
      padding: 2em; 
      border-radius: 18px; 
      box-shadow: 0 0 18px rgba(0,0,0,0.08); 
      background: #fff; 
      text-align: center;
    }

    .title { 
      font-size: 2rem; 
      font-weight: bold; 
      margin-bottom: 1rem; 
    }

    video { 
      width: 100%; 
      height: auto; 
      border-radius: 12px; 
      border: 4px solid #e5e7eb; 
      margin-bottom: 1rem;
    }

    .result-area .alert { 
      font-size: 1.2rem; 
      font-weight: bold; 
      border-radius: 12px; 
    }
  </style>
</head>

<body>
  <div class="main-card">
    <div class="title">Driver Distraction Detection</div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div class="result-area" id="result-area"></div>

    <audio id="buzzer" src="{{ url_for('static', filename='buzzer.mp3') }}"></audio>

    <a href="/" class="btn btn-outline-secondary w-100 mt-3">Back to Upload</a>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const resultArea = document.getElementById('result-area');
    const buzzer = document.getElementById('buzzer');

    let isPredicting = false;
    let intervalId = null;

    // 🔥 SAFE CAMERA START
    function startCamera() {

      // Check HTTPS / localhost requirement
      const isLocalhost =
        location.hostname === "localhost" ||
        location.hostname === "127.0.0.1";

      const isSecure = location.protocol === "https:" || isLocalhost;

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert("❌ Camera not supported in this browser.");
        return;
      }

      if (!isSecure) {
        alert("❌ Webcam requires HTTPS or localhost.\nRun using Live Server or http://localhost");
        return;
      }

      navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
          video.srcObject = stream;

          video.onloadedmetadata = () => {
            video.play();
            startPredictLoop();
          };
        })
        .catch(error => {
          console.error("Camera Error:", error);
          alert("❌ Camera access denied or not available.\n\n" + error);
        });
    }

    // 📸 Capture + send frame
    function predictFrame() {
      if (video.videoWidth === 0 || video.videoHeight === 0) return;

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);

      canvas.toBlob(blob => {
        let formData = new FormData();
        formData.append('file', blob, 'capture.jpg');

        fetch('/webcam_predict', {
          method: 'POST',
          body: formData
        })
        .then(res => res.json())
        .then(data => {

          let html = '';

          if (data.severity === 'high') {
            html = `<div class='alert alert-danger'>⚠ HIGH RISK!<br>${data.label}</div>`;
            playBuzzer();

          } else if (data.severity === 'medium') {
            html = `<div class='alert alert-warning'>⚠ WARNING<br>${data.label}</div>`;
            playBuzzer();

          } else {
            html = `<div class='alert alert-success'>✔ SAFE DRIVING<br>${data.label}</div>`;
          }

          resultArea.innerHTML = html;
        })
        .catch(err => console.error("Prediction error:", err));

      }, 'image/jpeg');
    }

    // 🔊 Safe audio play (browser fix)
    function playBuzzer() {
      try {
        buzzer.currentTime = 0;
        buzzer.play().catch(err => {
          console.log("Audio blocked by browser:", err);
        });
      } catch (e) {
        console.log(e);
      }
    }

    // 🔁 Prediction loop
    function startPredictLoop() {
      if (isPredicting) return;

      isPredicting = true;

      intervalId = setInterval(() => {
        predictFrame();
      }, 2000);
    }

    // 🚀 START
    startCamera();
  </script>
</body>
</html>
